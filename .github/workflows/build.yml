name: Build CursorHighlight

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build binary
        run: |
          mkdir -p build
          swiftc -O \
          -target x86_64-apple-macos10.13 \
          -framework Cocoa \
          cursor_highlight_overlay.swift \
          -o build/CursorHighlight

      - name: Package app bundle
        run: |
          mkdir -p build/CursorHighlight.app/Contents/MacOS
          mkdir -p build/CursorHighlight.app/Contents/Resources

          cp build/CursorHighlight build/CursorHighlight.app/Contents/MacOS/CursorHighlight
          chmod +x build/CursorHighlight.app/Contents/MacOS/CursorHighlight

          cat > build/CursorHighlight.app/Contents/Info.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>CursorHighlight</string>
              <key>CFBundleIdentifier</key>
              <string>com.example.cursorhighlight</string>
              <key>CFBundleName</key>
              <string>CursorHighlight</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.13</string>
              <key>LSUIElement</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Zip app
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent CursorHighlight.app CursorHighlight.app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CursorHighlight-macOS
          path: build/CursorHighlight.app.zip
